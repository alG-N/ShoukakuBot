# Grafana Data Sources Provisioning
# Automatically configures Prometheus as data source

apiVersion: 1

datasources:
  # ═══════════════════════════════════════════════════════════════
  # PROMETHEUS - Primary data source
  # ═══════════════════════════════════════════════════════════════
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: "2.48.0"
      cacheLevel: 'High'
      disableRecordingRules: false
      incrementalQueryOverlapWindow: 10m
    editable: true

  # Alertmanager datasource is intentionally disabled by default because
  # docker-compose.monitoring.yml does not start an alertmanager service.
  # Re-enable when running alertmanager in the same Docker network.
